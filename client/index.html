<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>互换闲置 - 闲置物品交换平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #f5f7fa;
      color: #333;
      min-height: 100vh;
    }
    a { text-decoration: none; color: inherit; }

    /* 顶部导航 */
    .navbar {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(102, 126, 234, 0.4);
    }
    .navbar-logo {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
    }
    .navbar-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.25); }
    .nav-btn.active { background: rgba(255,255,255,0.3); font-weight: 600; }
    .nav-btn.primary {
      background: white;
      color: #667eea;
      font-weight: 600;
      border: none;
    }
    .nav-btn.primary:hover { background: #f0f0f0; }
    .nav-user {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .nav-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 600;
    }
    .nav-nickname { font-weight: 500; }

    /* 容器 */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    /* 页面标题 */
    .page-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 24px;
      color: #1a1a2e;
    }

    /* 搜索和筛选 */
    .search-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      align-items: center;
    }
    .search-input {
      flex: 1;
      min-width: 200px;
      padding: 12px 18px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      background: white;
    }
    .search-input:focus { border-color: #667eea; }

    .category-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .category-tab {
      padding: 8px 18px;
      border-radius: 20px;
      border: 2px solid #e2e8f0;
      background: white;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      color: #555;
    }
    .category-tab:hover { border-color: #667eea; color: #667eea; }
    .category-tab.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-color: transparent;
      font-weight: 600;
    }

    /* 物品卡片网格 */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .item-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      transition: all 0.3s;
      cursor: pointer;
    }
    .item-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.12);
    }
    .item-card-img {
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      position: relative;
    }
    .item-card-img .category-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
    }
    .item-card-body {
      padding: 16px;
    }
    .item-card-title {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #1a1a2e;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-card-desc {
      font-size: 13px;
      color: #888;
      line-height: 1.5;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .item-card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #999;
    }
    .item-card-owner {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .item-card-owner .mini-avatar {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
    }
    .item-card-expect {
      color: #667eea;
      font-size: 12px;
      font-weight: 500;
    }
    .item-card-rating {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      margin-top: 8px;
      margin-bottom: 10px;
    }
    .item-card-rating .rating-star { color: #f59e0b; font-size: 14px; line-height: 1; }
    .item-card-rating .rating-score { font-weight: 700; color: #f59e0b; }
    .item-card-rating .rating-count { color: #999; }
    .item-card-rating .rating-none { color: #bbb; }

    /* 物品详情 */
    .detail-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      background: white;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    @media (max-width: 768px) {
      .detail-container { grid-template-columns: 1fr; }
    }
    .detail-image {
      height: 360px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
    }
    .detail-info h2 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .detail-category {
      display: inline-block;
      padding: 4px 14px;
      background: #eef2ff;
      color: #667eea;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
    }
    .detail-desc {
      color: #555;
      line-height: 1.8;
      margin-bottom: 20px;
      font-size: 15px;
    }
    .detail-expect {
      background: #f8f9ff;
      padding: 14px 18px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .detail-expect strong { color: #667eea; }
    .detail-owner {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 0;
      border-top: 1px solid #eee;
      margin-bottom: 16px;
    }
    .detail-owner .owner-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 600;
    }
    .detail-owner .owner-info { flex: 1; }
    .detail-owner .owner-name { font-weight: 600; font-size: 15px; }
    .detail-owner .owner-bio { font-size: 13px; color: #888; }
    .owner-rating {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      font-size: 13px;
    }
    .owner-rating .stars-row { display: inline-flex; gap: 2px; }
    .owner-rating .star-sm { font-size: 16px; color: #ddd; line-height: 1; }
    .owner-rating .star-sm.filled { color: #f59e0b; }
    .owner-rating .owner-rating-score { font-weight: 700; color: #f59e0b; }
    .owner-rating .owner-rating-count { color: #888; }
    .owner-rating .owner-rating-none { color: #aaa; }

    /* 按钮 */
    .btn {
      padding: 10px 24px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn-secondary {
      background: #f1f5f9;
      color: #475569;
    }
    .btn-secondary:hover:not(:disabled) { background: #e2e8f0; }
    .btn-success {
      background: #10b981;
      color: white;
    }
    .btn-success:hover:not(:disabled) { background: #059669; }
    .btn-danger {
      background: #ef4444;
      color: white;
    }
    .btn-danger:hover:not(:disabled) { background: #dc2626; }
    .btn-sm { padding: 6px 14px; font-size: 13px; border-radius: 8px; }
    .btn-block { width: 100%; justify-content: center; }

    /* 表单 */
    .form-group {
      margin-bottom: 18px;
    }
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      background: white;
      font-family: inherit;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: #667eea; }
    .form-textarea { resize: vertical; min-height: 100px; }

    /* 卡片容器 */
    .card {
      background: white;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .card-narrow {
      max-width: 480px;
      margin: 40px auto;
    }

    /* 认证页面 */
    .auth-toggle {
      text-align: center;
      margin-top: 16px;
      font-size: 14px;
      color: #888;
    }
    .auth-toggle span {
      color: #667eea;
      cursor: pointer;
      font-weight: 500;
    }

    /* 标签页 */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      border-bottom: 2px solid #eee;
      padding-bottom: 0;
    }
    .tab {
      padding: 12px 24px;
      cursor: pointer;
      font-size: 15px;
      color: #888;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
      font-weight: 500;
    }
    .tab:hover { color: #667eea; }
    .tab.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    /* 交换请求卡片 */
    .exchange-card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      border: 1px solid #f0f0f0;
    }
    .exchange-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .exchange-status {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-pending { background: #fef3c7; color: #d97706; }
    .status-accepted { background: #d1fae5; color: #059669; }
    .status-rejected { background: #fee2e2; color: #dc2626; }
    .exchange-items {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
    }
    .exchange-item {
      flex: 1;
      padding: 14px;
      background: #f8f9ff;
      border-radius: 10px;
      text-align: center;
    }
    .exchange-item .item-name {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }
    .exchange-item .item-category {
      font-size: 12px;
      color: #667eea;
    }
    .exchange-arrow {
      font-size: 24px;
      color: #667eea;
    }
    .exchange-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .exchange-person {
      font-size: 13px;
      color: #888;
      margin-bottom: 10px;
    }

    /* 评价 */
    .rating-stars {
      display: flex;
      gap: 4px;
    }
    .star {
      font-size: 24px;
      cursor: pointer;
      color: #ddd;
      transition: color 0.15s;
    }
    .star.filled { color: #f59e0b; }
    .star:hover { color: #f59e0b; }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
    }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state .empty-text { font-size: 16px; }

    /* 弹窗 */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 20px;
    }
    .modal {
      background: white;
      border-radius: 16px;
      padding: 32px;
      max-width: 500px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal h3 {
      font-size: 20px;
      margin-bottom: 20px;
    }

    /* 个人信息页 */
    .profile-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 32px;
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .profile-avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 700;
    }
    .profile-info h2 { font-size: 22px; margin-bottom: 4px; }
    .profile-info p { color: #888; font-size: 14px; }
    .profile-stats {
      display: flex;
      gap: 24px;
      margin-left: auto;
    }
    .stat-item {
      text-align: center;
    }
    .stat-value { font-size: 24px; font-weight: 700; color: #667eea; }
    .stat-label { font-size: 12px; color: #888; }

    /* 面包屑 / 返回 */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #667eea;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 20px;
      font-weight: 500;
    }
    .back-btn:hover { text-decoration: underline; }

    /* 页脚 */
    .footer {
      text-align: center;
      padding: 32px 20px;
      color: #bbb;
      font-size: 13px;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 80px;
      right: 20px;
      padding: 14px 24px;
      border-radius: 12px;
      color: white;
      font-size: 14px;
      font-weight: 500;
      z-index: 300;
      animation: slideIn 0.3s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .toast-success { background: #10b981; }
    .toast-error { background: #ef4444; }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* 分页 */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 32px;
    }
    .page-btn {
      padding: 8px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .page-btn:hover { border-color: #667eea; color: #667eea; }
    .page-btn.active { background: #667eea; color: white; border-color: #667eea; }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
